<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamburger Menu Icon</title>
  <style>
    /* =============================================
       HAMBURGER MENU ICON
       Drop this block into your portfolio CSS
       ============================================= */

    .hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 40px;
      height: 40px;
      padding: 8px;
      cursor: pointer;
      background: transparent;
      border: none;
      outline: none;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    .hamburger:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 4px;
      border-radius: 4px;
    }

    .hamburger .bar {
      display: block;
      width: 100%;
      height: 2px;
      background: currentColor;
      border-radius: 2px;
      transform-origin: center;
      transition:
        transform 0.35s cubic-bezier(0.23, 1, 0.32, 1),
        opacity   0.25s ease,
        width     0.35s cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* Optional: shorter middle bar for style */
    .hamburger .bar:nth-child(2) {
      width: 75%;
    }

    /* ---- Open / Close state ---- */
    .hamburger[aria-expanded="true"] .bar:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
      width: 100%;
    }

    .hamburger[aria-expanded="true"] .bar:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }

    .hamburger[aria-expanded="true"] .bar:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
      width: 100%;
    }


    /* =============================================
       BELOW THIS LINE: preview-only styles
       (do NOT copy into your portfolio)
       ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f0f0f;
      font-family: sans-serif;
    }

    .preview-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .preview-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
    }

    .hamburger {
      color: #f0f0f0;
    }

    .state-label {
      font-size: 13px;
      color: #555;
      transition: color 0.2s;
    }

    .state-label span {
      color: #f0f0f0;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- =============================================
       HAMBURGER ICON MARKUP
       Copy this <button> into your portfolio HTML
       ============================================= -->

  <div class="preview-card">
    <p class="preview-label">Hamburger Menu Icon</p>

    <button
      class="hamburger"
      aria-label="Toggle menu"
      aria-expanded="false"
      aria-controls="nav-menu"
    >
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <p class="state-label">State: <span id="state-text">closed</span></p>
  </div>


  <!-- =============================================
       HAMBURGER ICON JAVASCRIPT
       Copy this <script> into your portfolio JS
       ============================================= -->
  <script>
    const hamburger = document.querySelector('.hamburger');
    const stateText = document.getElementById('state-text'); // remove in portfolio

    hamburger.addEventListener('click', () => {
      const isOpen = hamburger.getAttribute('aria-expanded') === 'true';
      hamburger.setAttribute('aria-expanded', String(!isOpen));

      // Hook your nav open/close logic here:
      // e.g. document.getElementById('nav-menu').classList.toggle('open');

      // Preview only — remove in portfolio:
      if (stateText) stateText.textContent = !isOpen ? 'open' : 'closed';
    });
  </script>

</body>
</html>
